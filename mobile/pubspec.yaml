name: woodguard_mobile
description: WoodGuard Flutter mobile client for the existing FastAPI backend.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.3
  flutter_secure_storage: ^9.2.4
  geolocator: ^14.0.2
  google_fonts: ^6.3.2
  http: ^1.5.0
  intl: ^0.20.2
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
