services:
  postgres:
    image: postgres:17-alpine
    container_name: woodguard-postgres
    environment:
      POSTGRES_DB: woodguard
      POSTGRES_USER: woodguard
      POSTGRES_PASSWORD: woodguard
    ports:
      - "5432:5432"
    volumes:
      - woodguard_postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: woodguard-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - woodguard_minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: woodguard-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done
        /usr/bin/mc mb --ignore-existing local/woodguard
        exit 0

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: woodguard-api
    depends_on:
      - postgres
      - minio-init
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://woodguard:woodguard@postgres:5432/woodguard
      AUTO_CREATE_SCHEMA: "false"
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET_NAME: woodguard
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_REGION_NAME: us-east-1
      S3_KEY_PREFIX: woodguard
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    container_name: woodguard-frontend
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  woodguard_postgres_data:
  woodguard_minio_data:
